services:
  - type: web
    name: telemed-ai-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python setup_db.py"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SENDGRID_API_KEY
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_EMAIL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: OTP_DEBUG_PREVIEW
        value: "false"
